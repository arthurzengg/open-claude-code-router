name: test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      # --ignore-scripts keeps the postinstall lifecycle out of CI;
      # the unit tests only need devDependencies-free core modules.
      - run: npm ci --ignore-scripts
      - run: npm test
